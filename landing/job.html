<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>LocJobs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FFF8F4;
      min-height: 100vh;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .top-bar {
      width: 100%;
      max-width: 500px;
      padding: 12px 0 8px;
    }
    .top-bar h1 {
      font-size: 22px;
      font-weight: 800;
      color: #FF6B35;
      letter-spacing: -0.5px;
    }
    .card {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 20px;
      max-width: 500px;
      width: 100%;
      border: 1px solid #F0E4DA;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 12px;
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .card-title {
      font-size: 20px;
      font-weight: 700;
      color: #2D2B2A;
      flex: 1;
      line-height: 1.3;
      letter-spacing: -0.3px;
    }
    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 8px;
      text-transform: capitalize;
      white-space: nowrap;
      margin-top: 2px;
    }
    .badge-open { background: #E8F8F0; color: #2ECC71; }
    .badge-full { background: #FEF9E7; color: #F1C40F; }
    .badge-completed { background: #FFF4ED; color: #FF6B35; }
    .badge-cancelled { background: #FDEDEC; color: #E74C3C; }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }
    .tag {
      font-size: 12px;
      color: #A09388;
      background: #FFF8F4;
      padding: 4px 10px;
      border-radius: 8px;
      font-weight: 600;
    }
    .tag-primary {
      color: #FF6B35;
      background: #FFF0E8;
    }
    .price {
      font-size: 22px;
      font-weight: 800;
      color: #2D2B2A;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .posted {
      font-size: 12px;
      color: #A09388;
      font-weight: 500;
      margin-bottom: 10px;
    }
    .description {
      font-size: 14px;
      color: #666;
      line-height: 1.7;
      margin-bottom: 0;
      white-space: pre-wrap;
    }
    .divider {
      height: 1px;
      background: #F0E4DA;
      margin: 16px 0;
    }
    .section-label {
      font-size: 13px;
      font-weight: 700;
      color: #2D2B2A;
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .image-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }
    .image-scroll::-webkit-scrollbar { display: none; }
    .image-scroll img {
      width: 280px;
      height: 200px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
      scroll-snap-align: start;
      background: #F5F0EB;
    }
    .image-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 8px;
    }
    .image-dot {
      width: 6px;
      height: 6px;
      border-radius: 3px;
      background: #DDD5CE;
      transition: width 0.2s;
    }
    .image-dot.active {
      width: 18px;
      background: #FF6B35;
    }

    .uploader-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .uploader-avatar {
      width: 44px;
      height: 44px;
      border-radius: 22px;
      background: #FF6B35;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FFF;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .uploader-avatar img {
      width: 44px;
      height: 44px;
      border-radius: 22px;
      object-fit: cover;
    }
    .uploader-info {
      flex: 1;
      min-width: 0;
    }
    .uploader-name {
      font-size: 15px;
      font-weight: 700;
      color: #2D2B2A;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .verified-badge {
      width: 16px;
      height: 16px;
      vertical-align: middle;
    }
    .uploader-phone {
      font-size: 13px;
      color: #A09388;
      font-weight: 500;
      margin-top: 1px;
    }

    .app-section {
      text-align: center;
      padding: 4px 0;
    }
    .app-section p {
      font-size: 14px;
      color: #A09388;
      font-weight: 500;
      margin-bottom: 14px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #FF6B35;
      color: #FFFFFF;
      padding: 14px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-outline {
      background: transparent;
      color: #FF6B35;
      border: 1.5px solid #FF6B35;
    }
    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #F0E4DA;
      border-top-color: #FF6B35;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state {
      text-align: center;
      padding: 40px 20px;
    }
    .error-state h2 {
      font-size: 18px;
      color: #2D2B2A;
      margin-bottom: 8px;
    }
    .error-state p {
      font-size: 14px;
      color: #A09388;
    }
    .loader-wrap {
      display: flex;
      justify-content: center;
      padding: 60px 0;
    }
    @media (max-width: 480px) {
      body { padding: 12px; }
      .card { padding: 16px; }
      .card-title { font-size: 18px; }
      .image-scroll img { width: 220px; height: 160px; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <h1>LocJobs</h1>
  </div>

  <div id="content">
    <div class="loader-wrap">
      <div class="spinner"></div>
    </div>
  </div>

  <script>
    var SUPABASE_URL = 'https://axuroixwxueufgvodnde.supabase.co';
    var SUPABASE_ANON_KEY = 'sb_publishable_Owcd89uuD3g2DE7ZzSeUgw_RufrNPCr';

    var EMPLOYMENT_LABELS = {
      full_time: 'Full-Time', part_time: 'Part-Time', contract: 'Contract',
      permanent: 'Permanent', freelance: 'Freelance', internship: 'Internship',
      temporary: 'Temporary'
    };
    var SALARY_PERIOD_LABELS = { month: '/month', week: '/week', day: '/day', hour: '/hour', year: '/year' };

    var params = new URLSearchParams(window.location.search);
    var jobId = params.get('id');
    var content = document.getElementById('content');

    var DEEP_LINK = jobId ? 'locjobs://job/' + jobId : null;

    function tryOpenApp() {
      if (!DEEP_LINK) return;
      var iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = DEEP_LINK;
      document.body.appendChild(iframe);
      setTimeout(function() {
        window.location.href = DEEP_LINK;
      }, 200);
    }

    function relativeTime(dateStr) {
      var diff = Date.now() - new Date(dateStr).getTime();
      var mins = Math.floor(diff / 60000);
      if (mins < 1) return 'now';
      if (mins < 60) return mins + 'm ago';
      var hours = Math.floor(mins / 60);
      if (hours < 24) return hours + 'h ago';
      var days = Math.floor(hours / 24);
      if (days < 7) return days + 'd ago';
      var d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatSalary(min, max, period) {
      var s = min ? min.toLocaleString() : '';
      if (max) s += ' - ' + max.toLocaleString();
      if (period) s += ' ' + (SALARY_PERIOD_LABELS[period] || '/' + period);
      return s ? s + ' MMK' : null;
    }

    function parseUrls(urls) {
      if (Array.isArray(urls)) return urls;
      if (typeof urls === 'string') {
        try { return JSON.parse(urls); } catch(e) {}
        if (urls.startsWith('{') && urls.endsWith('}')) return urls.slice(1, -1).split(',').map(function(s) { return s.trim(); });
      }
      return [];
    }

    function renderCard(job, uploader) {
      var statusClass = 'badge-' + job.status;

      var tagsHtml = '<span class="tag tag-primary">' + (job.work_type || '') + '</span>';
      if (job.employment_type) {
        tagsHtml += '<span class="tag">' + (EMPLOYMENT_LABELS[job.employment_type] || job.employment_type) + '</span>';
      }
      if (job.category) {
        tagsHtml += '<span class="tag">' + escapeHtml(job.category) + '</span>';
      }
      var locationParts = [];
      if (job.city) locationParts.push(job.city);
      if (job.region) locationParts.push(job.region);
      if (locationParts.length) {
        tagsHtml += '<span class="tag">' + locationParts.join(', ') + '</span>';
      }
      if (job.vacancies > 1) {
        tagsHtml += '<span class="tag">' + job.vacancies + ' openings</span>';
      }

      var priceHtml = '';
      if (job.price && !job.employment_type) {
        priceHtml = '<div class="price">' + job.price.toLocaleString() + ' MMK</div>';
      } else if (job.salary_min != null && job.employment_type) {
        var formatted = formatSalary(job.salary_min, job.salary_max, job.salary_period);
        if (formatted) priceHtml = '<div class="price">' + formatted + '</div>';
      }

      var postedHtml = '<div class="posted">Posted ' + relativeTime(job.created_at || job.createdAt) + '</div>';

      var descHtml = job.description ? '<div class="description">' + escapeHtml(job.description) + '</div>' : '';

        var raw = job.image_urls;
      var images = parseUrls(raw);
      var imagesHtml = '';
      if (images.length > 0) {
        var imgs = '';
        for (var i = 0; i < images.length; i++) {
          imgs += '<img src="' + escapeHtml(images[i]) + '" alt="Job image ' + (i+1) + '" loading="lazy" onclick="window.open(\'' + escapeHtml(images[i]) + '\', \'_blank\')">';
        }
        var dots = '';
        if (images.length > 1) {
          for (var i = 0; i < job.image_urls.length; i++) {
            dots += '<span class="image-dot' + (i === 0 ? ' active' : '') + '" data-index="' + i + '"></span>';
          }
        }
        imagesHtml = '<div class="divider"></div><div class="section-label">Photos</div><div class="image-scroll" id="image-scroll">' + imgs + '</div><div class="image-dots" id="image-dots">' + dots + '</div>';

        setTimeout(function() {
          var scroll = document.getElementById('image-scroll');
          var dots = document.getElementById('image-dots');
          if (scroll && dots) {
            scroll.addEventListener('scroll', function() {
              var idx = Math.round(scroll.scrollLeft / 288);
              var spans = dots.querySelectorAll('.image-dot');
              for (var i = 0; i < spans.length; i++) {
                spans[i].className = 'image-dot' + (i === idx ? ' active' : '');
              }
            });
          }
        }, 100);
      }

      var uploaderHtml = '';
      if (uploader) {
        var avatarHtml = '';
        if (uploader.avatar_url) {
          avatarHtml = '<img src="' + escapeHtml(uploader.avatar_url) + '" alt="Avatar">';
        } else {
          avatarHtml = (uploader.display_name || '?')[0].toUpperCase();
        }
        var verifiedHtml = uploader.verified ? '<svg class="verified-badge" viewBox="0 0 24 24" fill="#2ECC71"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>' : '';
        uploaderHtml = '<div class="divider"></div><div class="section-label">Posted by</div><div class="uploader-row"><div class="uploader-avatar">' + avatarHtml + '</div><div class="uploader-info"><div class="uploader-name">' + escapeHtml(uploader.display_name || 'Anonymous') + ' ' + verifiedHtml + '</div>' + (uploader.phone ? '<div class="uploader-phone">' + escapeHtml(uploader.phone) + '</div>' : '') + '</div></div>';
      }

      content.innerHTML = `
        <div class="card">
          <div class="card-header">
            <div class="card-title">${escapeHtml(job.title)}</div>
            <span class="badge ${statusClass}">${job.status}</span>
          </div>
          <div class="tags">${tagsHtml}</div>
          ${priceHtml}
          ${postedHtml}
          ${descHtml}
          ${imagesHtml}
          ${uploaderHtml}
        </div>
        <div class="card" style="margin-top: 0;">
          <div class="app-section">
            <p>Get the full experience — apply, chat, and manage your jobs on the go.</p>
            <div class="btn-row">
              <button class="btn" onclick="tryOpenApp()">Open in App</button>
            </div>
          </div>
        </div>
      `;
    }

    function escapeHtml(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    if (jobId) {
      fetch(SUPABASE_URL + '/rest/v1/jobs?id=eq.' + jobId + '&select=*', {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        }
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.length > 0) {
          var job = data[0];
          fetch(SUPABASE_URL + '/rest/v1/users?id=eq.' + job.uploader_id + '&select=display_name,avatar_url,phone,verified', {
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
            }
          })
          .then(function(r) { return r.json(); })
          .then(function(userData) {
            var uploader = userData && userData.length > 0 ? userData[0] : null;
            renderCard(job, uploader);
            tryOpenApp();
          })
          .catch(function() {
            renderCard(job, null);
            tryOpenApp();
          });
        } else {
          content.innerHTML = '<div class="card"><div class="error-state"><h2>Job not found</h2><p>This job may have been removed or the link is invalid.</p></div></div>';
        }
      })
      .catch(function() {
        content.innerHTML = '<div class="card"><div class="error-state"><h2>Something went wrong</h2><p>Could not load this job. Please try again.</p></div></div>';
      });
    } else {
      content.innerHTML = '<div class="card"><div class="error-state"><h2>Invalid link</h2><p>No job ID provided.</p></div></div>';
    }
  </script>
</body>
</html>
